services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: expense_tracker_db
      POSTGRES_USER: expense_user
      POSTGRES_PASSWORD: x6@B!xP4#R9kT2Lq
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DB_HOST=db

volumes:
  postgres_data:
